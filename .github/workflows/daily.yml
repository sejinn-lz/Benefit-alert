#!/usr/bin/env python3
"""
온통청년(youthcenter.go.kr) 오픈 API에서 청년 정책 정보를 가져와
docs/data.json 에 저장하는 스크립트.

- 관심 카테고리별 키워드로 검색
- 이전 실행 결과와 비교해서 새로 생긴 정책(new)을 표시
- GitHub Pages(docs 폴더)로 배포되는 data.json 을 갱신

필요한 환경변수:
  YOUTHCENTER_API_KEY : 온통청년에서 발급받은 인증키 (openApiVlak)
"""

import json
import os
import sys
from datetime import datetime, timezone, timedelta
from pathlib import Path
from urllib.parse import urlencode
from urllib.request import urlopen
from urllib.error import URLError, HTTPError

API_URL = "https://www.youthcenter.go.kr/opi/youthPlcyList.do"

# ── 여기서 관심 카테고리/키워드를 자유롭게 편집하세요 ──────────────────
# key: 화면에 표시될 카테고리 이름
# value: 온통청년 API에 넘길 검색 키워드 (여러 개면 OR 검색됨)
# 순서 = 우선순위 (지금 상태: 서울 거주 / 구직·취업준비중 기준으로 정렬)
CATEGORIES = {
    "취업/구직 지원금": "국민취업지원제도 청년구직활동지원금 내일배움카드 채용 면접수당",
    "청년 주택/전월세(서울)": "서울 청년 주택 전세 임대 LH SH 매입임대 청년안심주택",
    "현금성 지원(서울 청년수당 등)": "서울 청년수당 안심소득 에너지바우처 생활지원금",
    "교육/자격증/학자금": "국가장학금 학자금대출 자격증 취득 교육비 지원",
}

DATA_FILE = Path(__file__).resolve().parent.parent / "docs" / "data.json"
KST = timezone(timedelta(hours=9))


def fetch_category(api_key: str, keyword: str, display: int = 30) -> list[dict]:
    """카테고리 키워드로 온통청년 API를 호출해 정책 리스트를 반환한다."""
    params = {
        "openApiVlak": api_key,
        "display": display,
        "pageIndex": 1,
        "keyword": keyword,
        "rtnType": "json",
    }
    url = f"{API_URL}?{urlencode(params)}"
    try:
        with urlopen(url, timeout=20) as resp:
            raw = resp.read().decode("utf-8")
    except (URLError, HTTPError) as e:
        print(f"[경고] API 호출 실패 (keyword={keyword}): {e}", file=sys.stderr)
        return []

    try:
        payload = json.loads(raw)
    except json.JSONDecodeError:
        print(f"[경고] JSON 파싱 실패 (keyword={keyword}). 응답 일부: {raw[:200]}", file=sys.stderr)
        return []

    items = (
        payload.get("result", {}).get("youthPolicyList")
        or payload.get("youthPolicyList")
        or []
    )
    return items


def normalize(item: dict, category_name: str) -> dict:
    """API 응답 필드를 화면에서 쓰기 좋은 형태로 정리.

    주의: 온통청년 API 실제 응답 필드명은 신청 승인 후 첫 실행 결과를 보고
    한 번 더 맞춰야 할 수 있습니다(문서 페이지가 JS로 그려져서 필드명을
    100% 확정하지 못했어요). 아래는 후보 필드명을 여러 개 넣어 둔 상태라
    실제 응답과 다르면 fetch_policies.py 실행 로그의 원본 JSON을 보고
    .get(...) 안의 키 이름만 바꿔주면 됩니다.
    """
    plcy_no = item.get("bizId") or item.get("plcyNo") or item.get("polyBizSjnm", "")
    deadline = (
        item.get("aplyYmd")
        or item.get("rqutPrdCn")
        or item.get("plcyAplyPrdSeCd")
        or "마감일 정보 없음 (공고 확인 필요)"
    )
    benefit = (
        item.get("plcySprtCn")
        or item.get("sprtCn")
        or item.get("polyItcnCn")
        or ""
    )
    return {
        "id": str(plcy_no),
        "title": item.get("polyBizSjnm") or item.get("plcyNm") or "제목 없음",
        "org": item.get("sponsorInstCdNm") or item.get("rgtrInstCdNm") or "",
        "category": category_name,
        "deadline": deadline,
        "period": item.get("rqutPrdCn") or item.get("aplyYmd") or "상시/공고 참고",
        "url": item.get("rqutUrla") or item.get("aplyUrlAddr") or "https://www.youthcenter.go.kr",
        "summary": benefit[:80] if benefit else "핵심 지원내용은 공고에서 확인",
    }


def load_previous() -> dict:
    if DATA_FILE.exists():
        try:
            return json.loads(DATA_FILE.read_text(encoding="utf-8"))
        except json.JSONDecodeError:
            return {}
    return {}


def main() -> None:
    api_key = os.environ.get("YOUTHCENTER_API_KEY")
    if not api_key:
        print("[오류] YOUTHCENTER_API_KEY 환경변수가 없습니다.", file=sys.stderr)
        sys.exit(1)

    previous = load_previous()
    previous_ids = {it["id"] for it in previous.get("items", [])}

    all_items: list[dict] = []
    for category_name, keyword in CATEGORIES.items():
        raw_items = fetch_category(api_key, keyword)
        for raw in raw_items:
            all_items.append(normalize(raw, category_name))

    # id 기준 중복 제거
    seen = set()
    deduped = []
    for it in all_items:
        if it["id"] in seen:
            continue
        seen.add(it["id"])
        it["is_new"] = it["id"] not in previous_ids
        deduped.append(it)

    new_count = sum(1 for it in deduped if it["is_new"])

    output = {
        "last_updated": datetime.now(KST).isoformat(),
        "new_count": new_count,
        "total_count": len(deduped),
        "items": deduped,
    }

    DATA_FILE.parent.mkdir(parents=True, exist_ok=True)
    DATA_FILE.write_text(
        json.dumps(output, ensure_ascii=False, indent=2), encoding="utf-8"
    )
    print(f"완료: 총 {len(deduped)}건, 신규 {new_count}건")


if __name__ == "__main__":
    main()
