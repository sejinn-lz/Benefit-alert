name: 매일 청년 정책 수집

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 정책 정보 수집
        env:
          YOUTHCENTER_API_KEY: ${{ secrets.YOUTHCENTER_API_KEY }}
        run: python scripts/fetch_policies.py

      - name: 변경사항 커밋 및 푸시
        run: |
          git config user.name "benefit-alert-bot"
          git config user.email "actions@github.com"
          git add docs/data.json
          if git diff --cached --quiet; then
            echo "변경사항 없음"
          else
            git commit -m "정책 정보 자동 업데이트 $(date +'%Y-%m-%d %H:%M')"
            git push
          fi
